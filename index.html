<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Em Yến ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
overflow:hidden;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff9ecb,#ffd1dc,#ffe8f3,#ffc0cb);
background-size:400% 400%;
animation:bg 10s infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:750px;
padding:45px;
text-align:center;
background:rgba(255,255,255,.18);
backdrop-filter:blur(18px);
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,.2);
z-index:10;
position:relative;
}

h1{
font-size:55px;
color:white;
}

.name{
font-size:70px;
font-weight:bold;
color:#ff0055;
text-shadow:0 0 20px white;
margin:15px 0;
}

p{
font-size:24px;
color:white;
line-height:1.8;
margin:15px 0;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:50px;
background:#ff0055;
color:white;
cursor:pointer;
transition:.3s;
margin-top:20px;
}

button:hover{
transform:scale(1.08);
}

#msg{
display:none;
font-size:32px;
margin-top:25px;
font-weight:bold;
color:white;
}

.heart,.text{
position:fixed;
pointer-events:none;
}

.heart{
animation:heart 6s linear forwards;
}

.text{
font-weight:bold;
white-space:nowrap;
animation:textFly linear forwards;
}

@keyframes heart{
0%{
transform:translateY(100vh) scale(.5);
opacity:1;
}
100%{
transform:translateY(-120vh) scale(2);
opacity:0;
}
}

@keyframes textFly{
0%{
transform:translateY(100vh);
opacity:0;
}
10%{
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>

</head>

<body>

<div class="card">

<h1>💖 Gửi Em 💖</h1>

<div class="name">Yến</div>

<p>🌸 Chúc em Yến mau khỏi bệnh.</p>

<p>😊 Chúc em luôn mạnh khỏe, vui vẻ và gặp thật nhiều may mắn.</p>

<p>✨ Chúc em luôn xinh gái, luôn rạng rỡ và cười thật nhiều.</p>

<p>❤️ Chúc em luôn hạnh phúc, gặp nhiều điều tốt đẹp và có thật nhiều người yêu quý em. ❤️</p>

<button onclick="love()">Nhấn vào đây ❤️</button>

<div id="msg">
🥰 Chúc em Yến luôn bình an và hạnh phúc! 🥰
</div>

</div>

<script>

const texts=[
"🌸 Chúc Yến mau khỏi bệnh 🌸",
"❤️ Yến luôn xinh gái ❤️",
"😊 Chúc em luôn vui vẻ 😊",
"💖 Bình an nhé Yến 💖",
"🌷 Luôn mỉm cười nhé 🌷",
"✨ Chúc em hạnh phúc ✨",
"❤️ Có thật nhiều người yêu quý em ❤️"
];

function createHeart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=["❤️","💕","💖","🌸","🌹","💐"][Math.floor(Math.random()*6)];

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*30)+"px";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

function createText(){

let t=document.createElement("div");

t.className="text";

t.innerHTML=texts[Math.floor(Math.random()*texts.length)];

t.style.left=Math.random()*100+"vw";

t.style.fontSize=(18+Math.random()*18)+"px";

t.style.color=["#fff","#ff0055","#ffff66","#00ffff","#7CFC00"][Math.floor(Math.random()*5)];

t.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(t);

setTimeout(()=>t.remove(),9000);

}

setInterval(createHeart,250);
setInterval(createText,220);

function love(){

document.getElementById("msg").style.display="block";

for(let i=0;i<180;i++){

setTimeout(createHeart,i*25);

setTimeout(createText,i*25);

}

}

</script>

</body>
</html>
